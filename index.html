<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Charan The Runner</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- START SCREEN -->
<div id="startScreen">
  <div class="stars" id="stars"></div>
  <div class="start-content">
    <div class="logo-wrap">
      <div class="logo-sub">⚡ THE LEGEND ⚡</div>
      <h1 class="logo">CHARAN</h1>
      <h2 class="logo-runner">THE RUNNER</h2>
    </div>
    <div class="start-desc">Dodge traps. Collect coins. Survive the chaos.</div>
    <button id="startBtn" class="btn-start">▶ &nbsp;START GAME</button>
    <div class="controls-hint">
      <span>⬆ SPACE</span><span>/ TAP</span><span>to jump</span>
      <span style="margin-left:16px">P</span><span>to pause</span>
    </div>
  </div>
</div>

<!-- HUD -->
<div id="hud">
  <div class="hud-pill">❤️ <span id="lives">3</span></div>
  <div class="hud-pill hud-center">
    <span class="hud-level" id="levelDisp">LVL 1</span>
    <span class="hud-sep">|</span>
    💰 <span id="score">0</span>
  </div>
  <div class="hud-pill">🏆 <span id="bestScore">0</span></div>
</div>

<!-- CANVAS -->
<canvas id="game"></canvas>

<!-- PAUSE BTN -->
<button id="pauseBtn">⏸</button>

<!-- COMBO -->
<div id="comboPopup"></div>
<!-- LEVEL BANNER -->
<div id="levelBanner"></div>

<!-- GAME OVER -->
<div id="gameOverScreen">
  <div class="go-card">
    <div class="go-skull">💀</div>
    <h1 class="go-title">GAME OVER</h1>
    <div class="go-stats">
      <div class="go-stat"><span class="go-label">SCORE</span><span class="go-val" id="finalScore">0</span></div>
      <div class="go-divider"></div>
      <div class="go-stat"><span class="go-label">BEST</span><span class="go-val gold" id="finalBestScore">0</span></div>
    </div>
    <div id="newRecord" class="new-record" style="display:none">🎉 NEW RECORD!</div>
    <button id="restartBtn" class="btn-start" style="font-size:20px;padding:12px 40px">🔄 TRY AGAIN</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
